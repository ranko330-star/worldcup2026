<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2026 FIFAワールドカップ — 結果トラッカー</title>
<style>
  body{margin:0;display:grid;min-height:100vh;place-items:center;background:#FAF9F6;color:#15181C;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif}
  .error{display:none;max-width:520px;margin:24px;padding:18px 20px;border:1px solid #E7E6E1;border-radius:11px;background:#fff;line-height:1.6}
</style>
</head>
<body>
<div class="error" id="error"></div>
<script>
(async()=>{
  const SOURCE_URL='https://raw.githubusercontent.com/ranko330-star/worldcup2026/1ed2544aa7927f5d310afe954583399ea92fda01/index.html';
  const FIFA_RANK = {
    "Argentina":1,
    "Spain":2,
    "France":3,
    "England":4,
    "Portugal":5,
    "Brazil":6,
    "Morocco":7,
    "Netherlands":8,
    "Belgium":9,
    "Germany":10,
    "Croatia":11,
    "Colombia":13,
    "Mexico":14,
    "Senegal":15,
    "Uruguay":16,
    "USA":17,
    "United States":17,
    "United States of America":17,
    "Japan":18,
    "Switzerland":19,
    "Iran":20,
    "IR Iran":20,
    "Turkey":22,
    "Türkiye":22,
    "Turkiye":22,
    "Ecuador":23,
    "Austria":24,
    "South Korea":25,
    "Korea Republic":25,
    "Australia":27,
    "Algeria":28,
    "Egypt":29,
    "Canada":30,
    "Norway":31,
    "Ivory Coast":33,
    "Côte d'Ivoire":33,
    "Cote d'Ivoire":33,
    "Panama":34,
    "Sweden":38,
    "Czechia":40,
    "Czech Republic":40,
    "Paraguay":41,
    "Scotland":42,
    "Tunisia":45,
    "DR Congo":46,
    "Congo DR":46,
    "Democratic Republic of the Congo":46,
    "Uzbekistan":50,
    "Qatar":56,
    "Iraq":57,
    "South Africa":60,
    "Saudi Arabia":61,
    "Jordan":63,
    "Bosnia and Herzegovina":64,
    "Bosnia & Herzegovina":64,
    "Bosnia-Herzegovina":64,
    "Bosnia &amp; Herzegovina":64,
    "Cape Verde":67,
    "Cabo Verde":67,
    "Ghana":73,
    "Curaçao":82,
    "Curacao":82,
    "Haiti":83,
    "New Zealand":85
  };
  try{
    const res=await fetch(SOURCE_URL,{cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const source=await res.text();
    const replacement='const FIFA_RANK = '+JSON.stringify(FIFA_RANK,null,2)+';';
    const updated=source.replace(/const FIFA_RANK = \{[\s\S]*?\n\};/,replacement);
    if(updated===source) throw new Error('FIFA_RANK block was not found.');
    document.open();
    document.write(updated);
    document.close();
  }catch(err){
    const box=document.getElementById('error');
    box.style.display='block';
    box.textContent='ページの読み込みに失敗しました。ページを再読み込みしてください。';
    console.error(err);
  }
})();
</script>
</body>
</html>
