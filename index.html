<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>2026 FIFAワールドカップ — 結果トラッカー</title>
<style>
:root{
  --ink:#15181C; --soft:#646A72; --faint:#9AA0A6;
  --line:#E7E6E1; --line2:#EFEEE9;
  --paper:#FAF9F6; --surface:#FFFFFF;
  --green:#1A7A48; --green-soft:#E8F1EB; --green-line:#BFE0CC;
  --amber:#A9711A; --amber-soft:#F8EFD9;
  --hi:#FBF7EC;
  --shadow:0 1px 2px rgba(20,24,28,.04),0 8px 24px rgba(20,24,28,.05);
  --r:11px;
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,system-ui,sans-serif;
  color:var(--ink); background:var(--paper);
  font-variant-numeric:tabular-nums; -webkit-font-smoothing:antialiased;
  line-height:1.45;
}
.wrap{max-width:1080px;margin:0 auto;padding:0 18px 64px}

/* header */
header.top{position:sticky;top:0;z-index:20;background:rgba(250,249,246,.86);
  backdrop-filter:saturate(1.4) blur(8px);border-bottom:1px solid var(--line)}
.topbar{max-width:1080px;margin:0 auto;padding:14px 18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.brand{display:flex;flex-direction:column;gap:2px;margin-right:auto}
.brand h1{margin:0;font-size:19px;font-weight:800;letter-spacing:-.01em}
.brand .accent{color:var(--green)}
.brand p{margin:0;font-size:12px;color:var(--soft)}
.ctl{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.updated{font-size:11.5px;color:var(--faint);white-space:nowrap}
button.btn{font:inherit;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--line);
  background:var(--surface);color:var(--ink);padding:7px 13px;border-radius:8px;display:inline-flex;align-items:center;gap:7px;
  transition:border-color .15s,background .15s,transform .05s}
button.btn:hover{border-color:#cfcdc6}
button.btn:active{transform:translateY(1px)}
button.btn:focus-visible{outline:2px solid var(--green);outline-offset:2px}
.btn .spin{width:13px;height:13px;border:2px solid var(--green-line);border-top-color:var(--green);border-radius:50%;display:none}
.btn.loading .spin{display:inline-block;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.src{font-size:11.5px;color:var(--soft);display:flex;align-items:center;gap:5px}
.src select{font:inherit;font-size:11.5px;border:1px solid var(--line);border-radius:6px;padding:3px 6px;background:var(--surface);color:var(--ink)}

/* tabs */
.tabs{display:flex;gap:4px;padding:14px 0 4px;position:sticky;top:57px;background:var(--paper);z-index:10}
.tab{font:inherit;font-size:13.5px;font-weight:600;border:none;background:transparent;color:var(--soft);
  padding:8px 14px;border-radius:999px;cursor:pointer;transition:color .15s,background .15s}
.tab[a-sel="1"]{background:var(--ink);color:#fff}
.tab:not([a-sel="1"]):hover{background:#ECEBE6;color:var(--ink)}
.tab:focus-visible{outline:2px solid var(--green);outline-offset:2px}

/* banner */
.banner{margin:12px 0;padding:11px 14px;border:1px solid var(--amber-soft);background:var(--amber-soft);
  border-radius:9px;font-size:12.5px;color:#6b4a12;display:none;gap:10px;align-items:flex-start}
.banner.show{display:flex}
.banner b{color:#5a3d0e}

.sortbar{margin:10px 0 14px;display:flex;align-items:center;gap:8px;justify-content:flex-end;font-size:12.5px;color:var(--soft)}
.sortbar select{font:inherit;border:1px solid var(--line);border-radius:8px;padding:6px 9px;background:var(--surface);color:var(--ink)}
.teamfilter{justify-content:space-between;align-items:flex-end;flex-wrap:wrap}
.teamfilter label{display:flex;align-items:center;gap:8px}
.teamfilter select{min-width:180px}
.empty{padding:18px 14px;background:var(--surface);border:1px solid var(--line);border-radius:10px;color:var(--soft);font-size:13px}


/* group grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:14px;margin-top:8px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.card h3{margin:0;padding:11px 14px;font-size:13.5px;font-weight:800;letter-spacing:.02em;border-bottom:1px solid var(--line2);
  display:flex;align-items:center;gap:9px;background:linear-gradient(180deg,#fff, #fcfbf8)}
.gchip{display:inline-grid;place-items:center;width:22px;height:22px;border-radius:6px;background:var(--green);color:#fff;font-size:12px;font-weight:800}
table.st{width:100%;border-collapse:collapse;font-size:12.5px;table-layout:auto}
table.st th,table.st td{padding:7px 6px;text-align:center;border-bottom:1px solid var(--line2)}
table.st th{font-size:10.5px;color:var(--faint);font-weight:700;letter-spacing:.03em;text-transform:uppercase}
table.st td.team{text-align:left;font-weight:600;white-space:nowrap;overflow:visible;text-overflow:clip;max-width:none}
table.st td.pts{font-weight:800}
table.st tr.adv td{background:var(--green-soft)}
table.st tr.adv td.team{box-shadow:inset 3px 0 0 var(--green)}
table.st td.ph{color:var(--faint);font-weight:500;font-style:italic}
.rk{display:inline-block;width:15px;color:var(--faint);font-weight:700;margin-right:6px}
tr.adv .rk{color:var(--green)}
.legend{font-size:11px;color:var(--faint);padding:8px 14px;border-top:1px solid var(--line2);background:#fcfbf8}
.legend .dot{display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--green);margin-right:5px;vertical-align:middle}

/* matches */
.daygroup{margin-top:18px}
.dayhd{font-size:13px;font-weight:800;color:var(--ink);margin:0 0 8px;display:flex;align-items:baseline;gap:9px}
.dayhd small{font-weight:600;color:var(--faint);font-size:11.5px}
.mlist{display:flex;flex-direction:column;gap:8px}
.match{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;
  background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:11px 14px;box-shadow:var(--shadow)}
.match .side{display:flex;align-items:center;gap:9px;min-width:0}
.match .side.home{justify-content:flex-end;text-align:right}
.match .side.away{justify-content:flex-start;text-align:left}
.tname{font-size:14px;font-weight:650;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tname.ph{color:var(--faint);font-weight:500;font-size:12.5px;font-style:italic}
.tname.win{font-weight:850}
.score{font-size:20px;font-weight:850;letter-spacing:.02em;min-width:58px;text-align:center;
  padding:2px 10px;border-radius:8px;background:#F3F2EE;color:var(--ink);white-space:nowrap}
.score.final{background:var(--ink);color:#fff}
.ko{min-width:58px;text-align:center;font-size:12.5px;font-weight:750;color:var(--soft)}
.meta{grid-column:1/-1;display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:3px;
  font-size:11.5px;color:var(--faint)}

.pred{grid-column:1/-1;margin-top:7px;padding:9px 10px;border:1px solid var(--green-line);background:var(--green-soft);border-radius:9px;font-size:11.5px;color:var(--ink)}
.pred .pt{font-weight:850;color:var(--green);margin-bottom:5px}
.pred .bars{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin:5px 0}
.pred .bar{background:#fff;border:1px solid var(--line);border-radius:7px;padding:5px 6px;min-width:0}
.pred .bar b{display:block;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pred .bar span{font-size:13px;font-weight:850}
.pred .note{color:var(--soft);font-size:10.8px;line-height:1.45}

.chip{font-size:10.5px;font-weight:800;letter-spacing:.03em;padding:2px 7px;border-radius:999px}
.chip.fin{background:var(--green-soft);color:var(--green)}
.chip.today{background:var(--amber-soft);color:var(--amber)}
.chip.up{background:#F0EFEA;color:var(--soft)}
.chip.pk{background:#EEE9F5;color:#6B4FA0}
.rndtag{font-size:11px;font-weight:800;color:var(--green);letter-spacing:.02em}
.view{display:none}
.view.on{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.foot{margin-top:30px;font-size:11px;color:var(--faint);text-align:center;line-height:1.7}
.foot a{color:var(--soft)}


@media (max-width:560px){
  .brand h1{font-size:17px}
  .match{grid-template-columns:1fr auto 1fr;padding:10px 12px}
  .tname{font-size:13px}.score{font-size:18px;min-width:52px}
  .grid{grid-template-columns:1fr}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

function formAdjust(team){

  DATA.forEach(m=>{

      const gf=home?s[0]:s[1], ga=home?s[1]:s[0];

      pts += gf>ga?3:gf===ga?1:0;

function poisson(k, lambda){

function scoreCandidates(lambda1, lambda2, maxGoals=5){
  const rows=[];

    for(let b=0;b<=maxGoals;b++){
      rows.push({score:`${a}-${b}`, prob:poisson(a,lambda1)*poisson(b,lambda2), total:a+b, margin:Math.abs(a-b)});
    }
  }
  rows.sort((x,y)=>y.prob-x.prob || x.total-y.total || x.margin-y.margin);
  const picked=[];
  for(const r of rows){
    if(picked.some(p=>p.score===r.score)) continue;
    picked.push(r);
    if(picked.length>=3) break;
  }

  });
  box.appendChild(bars);
  box.appendChild(el('div','note',`有力スコア：${pr.scores.join(" / ")} ／ 期待得点：${pr.xg} ／ 根拠：固定Elo、開催国補正、反映済み試合の直近成績。オッズ・賭け事情報は未使用。`));
  return box;
}

/* ---- standings ---- */
function standings(groupName){
  const ms=DATA.filter(m=>m.group===groupName);
  const teams={};
  ms.forEach(m=>{[m.team1,m.team2].forEach(t=>{ if(!teams[t]) teams[t]={team:t,P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0,ph:isPlaceholder(t)};});});
  ms.forEach(m=>{
    const s=ft(m); if(!s) return;
    const [a,b]=s, A=teams[m.team1],B=teams[m.team2];
    A.P++;B.P++;A.GF+=a;A.GA+=b;B.GF+=b;B.GA+=a;
    if(a>b){A.W++;B.L++;A.Pts+=3;} else if(b>a){B.W++;A.L++;B.Pts+=3;} else {A.D++;B.D++;A.Pts++;B.Pts++;}
  });
  return Object.values(teams).map(t=>({...t,GD:t.GF-t.GA}))
    .sort((x,y)=> y.Pts-x.Pts || y.GD-x.GD || y.GF-x.GF || x.team.localeCompare(y.team));
}

function renderGroups(){
  const box=$('#v-groups'); box.innerHTML='';
  const grid=el('div','grid');
  const gs=[...new Set(DATA.filter(m=>m.group).map(m=>m.group))];
  gs.forEach(g=>{
    const rows=standings(g);
    const card=el('div','card');
    const h=el('h3'); const letter=g.replace('Group ','');
    h.appendChild(Object.assign(el('span','gchip'),{textContent:letter}));
    h.appendChild(document.createTextNode(groupJa(g)));
    card.appendChild(h);
    const tb=el('table','st');
    tb.innerHTML=`<thead><tr><th style="text-align:left;width:60%">チーム</th><th>試</th><th>勝</th><th>分</th><th>敗</th><th>得失</th><th>点</th></tr></thead>`;
    const body=el('tbody');
    rows.forEach((r,i)=>{
      const tr=el('tr'); if(i<2 && !r.ph) tr.className='adv';
      const gd=(r.GD>0?'+':'')+r.GD;
      const td=el('td','team'+(r.ph?' ph':''));
      td.innerHTML=`<span class="rk">${i+1}</span>`+escapeHtml(teamLabel(r.team));
      tr.appendChild(td);
      [r.P,r.W,r.D,r.L,gd].forEach(v=>tr.appendChild(Object.assign(el('td'),{textContent:v})));
      tr.appendChild(Object.assign(el('td','pts'),{textContent:r.Pts}));
      body.appendChild(tr);
    });
    tb.appendChild(body); card.appendChild(tb);
    const lg=el('div','legend'); lg.innerHTML='<span class="dot"></span>上位2チームが決勝トーナメント進出 ／ [ ]内はFIFAランキング（2026年6月11日発表）';
    card.appendChild(lg);
    grid.appendChild(card);
  });
  box.appendChild(grid);
}


function matchRow(m){
  const s=ft(m), stt=statusOf(m);
  const row=el('div','match');
  const home=el('div','side home'), away=el('div','side away');
  const hn=el('div','tname'+(isPlaceholder(m.team1)?' ph':'')), an=el('div','tname'+(isPlaceholder(m.team2)?' ph':''));
  hn.textContent=teamJa(m.team1); an.textContent=teamJa(m.team2);
  if(s){ if(s[0]>s[1])hn.classList.add('win'); else if(s[1]>s[0])an.classList.add('win'); }
  home.appendChild(hn); away.appendChild(an);
  let mid;
  if(s){ mid=el('div','score final'); mid.textContent=`${s[0]} – ${s[1]}`; }
  else { const d=koDate(m); mid=el('div','ko'); mid.textContent=d?fmtT.format(d):(m.time||'未定'); }
  row.appendChild(home); row.appendChild(mid); row.appendChild(away);
  const meta=el('div','meta');
  const d=koDate(m);
  if(d) meta.appendChild(el('span',null,`${fmtJ.format(d)} ${fmtT.format(d)} 日本時間`));
  if(m.ground) meta.appendChild(el('span',null,'🏟 '+groundJa(m.ground)));
  if(m.group) meta.appendChild(el('span',null,groupJa(m.group)+'・'+roundJa(m.round))); else if(m.round) meta.appendChild(el('span',null,roundJa(m.round)));
  const chip=el('span','chip '+(stt==='fin'?'fin':stt==='today'?'today':'up'));
  chip.textContent=stt==='fin'?'確定':stt==='today'?'本日':'予定';
  meta.appendChild(chip);
  if(m.score&&m.score.p) { const pk=el('span','chip pk'); pk.textContent=`PK ${m.score.p[0]}-${m.score.p[1]}`; meta.appendChild(pk); }
  row.appendChild(meta);
  // prediction removed
  return row;
}


function renderToday(){
  const box=document.getElementById('todayList');
  if(!box) return;
  box.innerHTML='';
  const today=todayJ();
  const ms=DATA.filter(m=>jstDayKey(koDate(m))===today && m.group);
  const sec=el('div','daygroup');
  const list=el('div','mlist');
  ms.forEach(m=>list.appendChild(matchRow(m)));
  sec.appendChild(list);
  if(ms.length===0){
    sec.appendChild(el('div',null,'本日のグループステージ試合はありません。'));
  }
  box.appendChild(sec);
}


function canonicalTeamName(n){
  return String(n||'')
    .replace(/&amp;/g,'&')
    .replace(/\s*&\s*/g,' and ')
    .replace(/^USA$/,'United States')
    .replace(/^United States of America$/,'United States')
    .replace(/^Korea Republic$/,'South Korea')
    .replace(/^Czech Republic$/,'Czechia')
    .replace(/^Türkiye$/,'Turkey')
    .replace(/^Turkiye$/,'Turkey')
    .replace(/^Côte d'Ivoire$/,"Ivory Coast")
    .replace(/^Cote d'Ivoire$/,"Ivory Coast")
    .replace(/^Curacao$/,'Curaçao')
    .replace(/^Cabo Verde$/,'Cape Verde')
    .replace(/^Congo DR$/,'DR Congo')
    .replace(/^Democratic Republic of the Congo$/,'DR Congo')
    .trim();
}
function sameTeam(a,b){
  if(!a || !b) return false;
  return canonicalTeamName(a)===canonicalTeamName(b) || teamJa(a)===teamJa(b);
}
function getPlayableTeams(){
  const map=new Map();
  DATA.forEach(m=>{
    [m.team1,m.team2].forEach(t=>{
      if(!t || isPlaceholder(t)) return;
      const key=canonicalTeamName(t);
      if(!map.has(key)) map.set(key,t);
    });
  });
  return [...map.values()].sort((a,b)=>teamJa(a).localeCompare(teamJa(b),'ja'));
}
function populateTeamFilter(){
  const sel=document.getElementById('teamFilter');
  if(!sel) return;
  const before=sel.value;
  const teams=getPlayableTeams();
  sel.innerHTML='<option value="">国を選択</option>';
  teams.forEach(t=>{
    const opt=document.createElement('option');
    opt.value=t;
    opt.textContent=teamLabel(t);
    sel.appendChild(opt);
  });
  if(before && teams.some(t=>sameTeam(t,before))){
    sel.value=teams.find(t=>sameTeam(t,before)) || before;
  }else{
    const japan=teams.find(t=>sameTeam(t,'Japan'));
    if(japan) sel.value=japan;
  }
}
function selectedCountryMatches(){
  const sel=document.getElementById('teamFilter');
  if(!sel || !sel.value) return [];
  const team=sel.value;
  const mode=document.getElementById('countrySort') ? document.getElementById('countrySort').value : 'asc';
  return DATA.filter(m=>sameTeam(m.team1,team) || sameTeam(m.team2,team))
    .filter(m=>mode==='finished' ? !!ft(m) : true);
}
function renderCountry(){
  const box=document.getElementById('countryList');
  if(!box) return;
  box.innerHTML='';
  const sel=document.getElementById('teamFilter');
  if(!sel || !sel.value){
    box.appendChild(el('div','empty','国を選択してください。'));
    return;
  }
  const mode=document.getElementById('countrySort') ? document.getElementById('countrySort').value : 'asc';
  const desc = mode==='desc' || mode==='finished';
  const ms=selectedCountryMatches().sort((a,b)=> desc ? (koDate(b)||0)-(koDate(a)||0) : (koDate(a)||0)-(koDate(b)||0));
  const fin=ms.filter(m=>ft(m)).length;
  const title=el('div','dayhd');
  title.appendChild(el('span',null,`${teamLabel(sel.value)} の試合`));
  title.appendChild(el('small',null,`${ms.length}試合 ・ 確定 ${fin}`));
  box.appendChild(title);
  if(!ms.length){
    box.appendChild(el('div','empty','該当する試合はありません。'));
    return;
  }
  const byDay={};
  ms.forEach(m=>{const k=jstDayKey(koDate(m)); (byDay[k]=byDay[k]||[]).push(m);});
  Object.keys(byDay).sort((a,b)=> desc ? b.localeCompare(a) : a.localeCompare(b)).forEach(k=>{
    const dayMatches=byDay[k].sort((a,b)=> desc ? (koDate(b)||0)-(koDate(a)||0) : (koDate(a)||0)-(koDate(b)||0));
    const sec=el('div','daygroup');
    const d0=koDate(dayMatches[0]);
    const hd=el('div','dayhd'); hd.appendChild(Object.assign(el('span'),{textContent:d0?fmtJ.format(d0):k}));
    hd.appendChild(Object.assign(el('small'),{textContent:`${dayMatches.length}試合`}));
    sec.appendChild(hd);
    const list=el('div','mlist'); dayMatches.forEach(m=>list.appendChild(matchRow(m))); sec.appendChild(list);
    box.appendChild(sec);
  });
}

function renderMatches(){
  const box=$('#matchList'); box.innerHTML='';
  const mode=$('#matchSort').value;
  const groupMatches=DATA.filter(m=>m.group).filter(m=>mode==='finished' ? !!ft(m) : true);
  const byDay={};
  groupMatches.forEach(m=>{const k=jstDayKey(koDate(m)); (byDay[k]=byDay[k]||[]).push(m);});
  const desc = mode==='desc' || mode==='finished';
  Object.keys(byDay).sort((a,b)=> desc ? b.localeCompare(a) : a.localeCompare(b)).forEach(k=>{
    const ms=byDay[k].sort((a,b)=> desc ? (koDate(b)||0)-(koDate(a)||0) : (koDate(a)||0)-(koDate(b)||0));
    const sec=el('div','daygroup');
    const d0=koDate(ms[0]);
    const hd=el('div','dayhd'); hd.appendChild(Object.assign(el('span'),{textContent:d0?fmtJ.format(d0):k}));
    const fin=ms.filter(m=>ft(m)).length;
    hd.appendChild(Object.assign(el('small'),{textContent:`${ms.length}試合 ・ 確定 ${fin}`}));
    sec.appendChild(hd);
    const list=el('div','mlist'); ms.forEach(m=>list.appendChild(matchRow(m))); sec.appendChild(list);
    box.appendChild(sec);
  });
}

const KO_ORDER=["Round of 32","Round of 16","Quarter-final","Semi-final","Match for third place","Final"];
function renderKO(){
  const box=$('#koList'); box.innerHTML='';
  const mode=$('#koSort').value;
  const kms=DATA.filter(m=>!m.group).filter(m=>mode==='finished' ? !!ft(m) : true);
  const desc = mode==='desc' || mode==='finished';
  const byDay={};
  kms.forEach(m=>{const k=jstDayKey(koDate(m)); (byDay[k]=byDay[k]||[]).push(m);});
  Object.keys(byDay).sort((a,b)=> desc ? b.localeCompare(a) : a.localeCompare(b)).forEach(k=>{
    const ms=byDay[k].sort((a,b)=> desc ? (koDate(b)||0)-(koDate(a)||0) : (koDate(a)||0)-(koDate(b)||0));
    const sec=el('div','daygroup');
    const d0=koDate(ms[0]);
    const hd=el('div','dayhd'); hd.appendChild(Object.assign(el('span','rndtag'),{textContent:d0?fmtJ.format(d0):k}));
    const fin=ms.filter(m=>ft(m)).length;
    hd.appendChild(Object.assign(el('small'),{textContent:`${ms.length}試合 ・ 確定 ${fin}`}));
    sec.appendChild(hd);
    const list=el('div','mlist'); ms.forEach(m=>list.appendChild(matchRow(m))); sec.appendChild(list);
    box.appendChild(sec);
  });
}
function jpRound(r){return {"Round of 32":"ラウンド32","Round of 16":"ラウンド16","Quarter-final":"準々決勝","Semi-final":"準決勝","Match for third place":"3位決定戦","Final":"決勝"}[r]||r;}

function escapeHtml(s){return (s||"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function renderAll(){renderGroups();renderToday();populateTeamFilter();renderCountry();renderMatches();renderKO();}

/* ---- fetch ---- */
async function load(){
  const btn=$('#refresh'); btn.classList.add('loading'); btn.disabled=true;
  $('#banner').classList.remove('show');
  const url=URLS[$('#src').value]+'?_='+Date.now();
  try{
    const res=await fetch(url,{cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const j=await res.json();
    if(j&&Array.isArray(j.matches)&&j.matches.length){ DATA=j.matches; }
    const now=new Date();
    $('#updated').textContent='最終更新 '+fmtT.format(now);
  }catch(e){
    DATA=EMBED.matches.slice();
    $('#updated').textContent='オフライン表示';
    const b=$('#banner'); b.classList.add('show');
    b.innerHTML='<b>最新データを取得できませんでした。</b>&nbsp;日程は表示中、スコアは未反映です（社内ネットワークやプロキシ制限の可能性）。出典を切替えるか、しばらくして再度更新してください。';
  }finally{
    renderAll(); btn.classList.remove('loading'); btn.disabled=false;
  }
}

/* ---- nav ---- */
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.removeAttribute('a-sel'));
    t.setAttribute('a-sel','1');
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
    $('#v-'+t.dataset.view).classList.add('on');
  });
});
$('#refresh').addEventListener('click',load);
$('#src').addEventListener('change',load);
$('#matchSort').addEventListener('change',renderMatches);
$('#countrySort').addEventListener('change',renderCountry);
$('#teamFilter').addEventListener('change',renderCountry);
$('#koSort').addEventListener('change',renderKO);
renderAll(); load();
</script>
